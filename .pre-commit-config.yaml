fail_fast: true
repos:
  # 1. Python Linting & Formatting (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # 2. Markdown Linting (markdownlint)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2

  # 3. Markdown Formatting (Prettier)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types: [markdown]
        exclude: ^CHANGELOG\.md$

  # 4. Dogfooding: Remote Reference (Production & Distribution)
  # NOTE: Temporarily disabled until ADR-015/016 changes (impl phase) are merged to main.
  # - repo: https://github.com/masa-codehub/issue_creator_kit
  #   rev: main
  #   hooks:
  #     - id: ick-check
  #       name: Issue Kit Check (Remote)
  #       files: ^reqs/

  # 5. Local Hooks (Development & Speed)
  - repo: local
    hooks:
      - id: ick-check-local
        name: Issue Kit Check (Local)
        entry: uv run python -m issue_creator_kit.cli check --root reqs
        language: system
        pass_filenames: false
        files: ^reqs/
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        exclude: ^tests/
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false