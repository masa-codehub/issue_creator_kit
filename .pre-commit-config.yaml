fail_fast: true
repos:
  # 1. Python Linting & Formatting (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # 2. Markdown Linting (markdownlint)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2

  # 3. Markdown Formatting (Prettier)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types: [markdown]
        exclude: ^CHANGELOG\.md$

  # 4. Dogfooding: Distributed Hooks (this repo)
  # Validate task structure using the remote repository definition
  - repo: https://github.com/masa-codehub/dev_issue_creator_kit
    rev: 5ac5515c2f3658718c66ed90cd38625e1be1da3e
    hooks:
      - id: ick-check
        files: ^reqs/

  # 5. Local Hooks (Development & Testing)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        exclude: ^tests/
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
      - id: verify-workflow
        name: verify-workflow
        entry: bash tests/verify_workflow.sh
        language: system
        pass_filenames: false
        files: ^\.github/workflows/task-automation\.yml$
