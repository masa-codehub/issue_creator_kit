name: Gemini Issue Handler

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  gemini-implementation:
    # 新しく付与されたラベル (github.event.label.name) が TRIGGER_LABEL (デフォルト: 'gemini') の場合のみ実行
    # startsWith を使用し、'gemini' だけでなく 'gemini:arch' などのプレフィックス付きにも対応する
    if: startsWith(github.event.label.name, vars.TRIGGER_LABEL || 'gemini')
    runs-on: [self-hosted, gemini]
    env:
      GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ env.GITHUB_TOKEN }}

      - name: Refresh Environment
        run: |
          echo "Refreshing environment by removing persistent artifacts..."
          rm -rf .venv
          # 必要に応じて他にもリフレッシュしたいディレクトリがあればここに追加

      - name: Initialize Environment
        run: bash ./.build/run.sh

      - name: Gemini Implementer Phase
        id: implementer
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: error
          command: bash ./.github/workflows/script/gemini_implementer.sh
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          # ラベル名をカンマ区切り文字列として渡す
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}