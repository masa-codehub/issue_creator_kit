name: Gemini Review Analyzer

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze-comment:
    if: |
      github.actor == 'masa-codehub' &&
      (
        contains(github.event.pull_request.labels.*.name, vars.TRIGGER_LABEL || 'gemini') ||
        contains(join(github.event.pull_request.labels.*.name), format('{0}:', vars.TRIGGER_LABEL || 'gemini'))
      )
    runs-on: [self-hosted, gemini]
    concurrency:
      group: gemini-review-analyzer-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    env:
      GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Check GH_PAT for submodules
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "::warning title=Missing GH_PAT::GH_PAT is not set. Private submodule checkout might fail."
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          submodules: recursive
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Determine Agent Role
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          # ick をツールとして動的に実行してロールを決定
          ROLE=$(uv tool run --from git+https://github.com/masa-codehub/issue_creator_kit.git ick dispatch --labels "$LABELS")
          
          if [ -z "$ROLE" ] || [ "$ROLE" = "UNKNOWN" ]; then
            echo "::error::Failed to determine agent role from labels: $LABELS"
            exit 1
          fi
          
          echo "AGENT_ROLE=$ROLE" >> $GITHUB_ENV
          echo "Selected Role: $ROLE"

      - name: Refresh Environment
        run: |
          echo "Refreshing environment by removing persistent artifacts..."
          rm -rf .venv

      - name: Initialize Environment
        run: bash ./.build/run.sh

      - name: Analyze Review Comment
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_on: error
          command: bash ./.github/workflows/script/gemini_review_analyzer.sh
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          REVIEW_ID: ${{ github.event.review.id }}
          REVIEW_AUTHOR: ${{ github.event.review.user.login }}
          REVIEW_BODY: ${{ github.event.review.body }}
