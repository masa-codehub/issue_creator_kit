services:
  agent:
    build:
      context: ./${AGENT_NAME}
      dockerfile: .build/Dockerfile
    image: ${GITHUB_REPOSITORY}
    volumes:
      - ./${AGENT_NAME}:${CONTAINER_VOLUME:-/app}
      - uv_cache:${ROOT:-/root}/.cache/uv
      - gemini_auth:${ROOT:-/root}/.gemini
    working_dir: ${CONTAINER_VOLUME:-/app}
    env_file:
      - .env
    # command: ["bash", "run.sh"]
    stdin_open: true
    tty: true

volumes:
  gemini_auth:
    name: shared_gemini_auth
  uv_cache:
    name: uv_cache
  
